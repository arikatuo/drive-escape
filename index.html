<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周末自驾逃离计划</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7R2BCNPBSP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7R2BCNPBSP');
  </script>
  <script src="lang/zh-CN.js?v=2" id="lang-script"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; }

    #map { width: calc(100% - 280px); height: 100%; background: #e8e4d8; }

    /* 标题浮层 */
    .title-overlay {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      text-align: center;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 10px 24px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      cursor: pointer;
      white-space: nowrap;
      transition: box-shadow 0.15s;
    }
    .title-overlay:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    }
    .title-overlay .en {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #666;
    }
    .title-overlay h1 {
      font: 900 24px/1.2 "Noto Serif SC", serif;
      color: #1c1c1c;
      margin: 2px 0;
    }
    .title-overlay .sub {
      font: 700 13px/1.2 "Noto Serif SC", serif;
      color: #1a6e5c;
      letter-spacing: 0.1em;
    }

    /* 顶部右侧控件栏 */
    .top-controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1001;
    }

    /* 搜索框 */
    .search-box {
      width: 100%;
    }
    .search-box input {
      width: 100%;
      padding: 8px 14px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      font-size: 13px;
      outline: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .search-box input::placeholder { color: #aaa; }
    .search-box input:focus { box-shadow: 0 4px 20px rgba(0,0,0,0.18); }

    #search-results {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      overflow: hidden;
      display: none;
    }
    #search-results .result-item {
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    #search-results .result-item:last-child { border-bottom: none; }
    #search-results .result-item:hover { background: rgba(26,110,92,0.08); }
    #search-results .result-item .result-sub {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: none;
      pointer-events: none;
    }
    .loading-overlay.active { display: flex; }
    .loading-box {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #333;
      white-space: nowrap;
    }
    .loading-box .spinner {
      width: 16px; height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #1a6e5c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 图例 */
    .leaflet-control-zoom { display: none !important; }
    .legend {
      position: fixed;
      left: 12px;
      bottom: 24px;
      z-index: 1000;
      width: 150px;
      padding: 10px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      font-size: 10px;
    }
    .legend h3 { font-size: 12px; margin-bottom: 6px; }
    .legend .item, .legend .band {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 3px 0;
    }
    .legend .swatch {
      width: 16px; height: 10px;
      border: 1px solid rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    .legend .line-swatch {
      width: 16px; height: 0;
      flex-shrink: 0;
    }
    .legend .line-swatch.city { border-top: 2px solid #6b4c8a; }
    .legend .line-swatch.prov { border-top: 2px dashed #888; }
    .legend .line-swatch.origin { border-top: 3px solid #e88; }
    .legend .hatch {
      width: 16px; height: 10px;
      flex-shrink: 0;
      border: 1px solid rgba(0,0,0,0.2);
      background: repeating-linear-gradient(45deg, #aa2211, #aa2211 3px, #fff 3px, #fff 6px);
    }

    .control-card {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1001;
      width: 220px;
      padding: 14px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }
    .ctrl-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
      letter-spacing: .04em;
    }
    .transport-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .t-btn {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.6);
      color: #555;
      transition: all .15s;
    }
    .t-btn.active {
      background: #1a6e5c;
      color: #fff;
      border-color: #1a6e5c;
    }
    .time-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .time-row input[type=range] {
      flex: 1;
      accent-color: #1a6e5c;
    }
    #time-val {
      font-size: 13px;
      font-weight: 700;
      color: #1a6e5c;
      min-width: 20px;
    }
    .time-unit {
      font-size: 11px;
      color: #888;
    }
    #query-btn.ready {
      opacity: 1 !important;
      pointer-events: auto !important;
      box-shadow: 0 2px 8px rgba(26,110,92,0.3);
      animation: pulse-btn 1s ease 0.3s 2;
    }
    #query-btn.ready:hover { background: #15574a; }
    #query-btn.loading { opacity: 0.7; pointer-events: none; }
    @keyframes pulse-btn {
      0% { box-shadow: 0 0 0 0 rgba(26,110,92,0.5); }
      70% { box-shadow: 0 0 0 8px rgba(26,110,92,0); }
      100% { box-shadow: 0 0 0 0 rgba(26,110,92,0); }
    }

    /* 县区标签 */
    .county-label {
      font-weight: 600;
      line-height: 1.2;
      color: #111;
      text-align: center;
      white-space: pre;
      text-shadow:
        -1px -1px 0 rgba(255,255,255,0.9),
        1px -1px 0 rgba(255,255,255,0.9),
        -1px 1px 0 rgba(255,255,255,0.9),
        1px 1px 0 rgba(255,255,255,0.9),
        0 0 4px rgba(255,255,255,0.8);
      pointer-events: none;
      transform: translate(-50%, -50%);
    }
    .county-label.gray {
      color: #888;
      font-weight: 400;
      text-shadow:
        -1px -1px 0 rgba(255,255,255,0.7),
        1px -1px 0 rgba(255,255,255,0.7),
        -1px 1px 0 rgba(255,255,255,0.7),
        1px 1px 0 rgba(255,255,255,0.7);
    }

    /* 信息面板 */
    .info-panel {
      position: fixed;
      right: 292px;
      bottom: 24px;
      z-index: 1000;
      padding: 12px 16px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      font-size: 13px;
      line-height: 1.5;
      display: none;
      max-width: 220px;
    }
    .info-panel h4 { font-size: 15px; margin-bottom: 4px; }
    .info-panel .time { color: #1a6e5c; font-weight: 700; }

    #result-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100vh;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: -2px 0 16px rgba(0,0,0,0.10);
      z-index: 999;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #result-panel-header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      flex-shrink: 0;
      background: rgba(255,255,255,0.97);
    }
    #result-summary {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    #result-sort-btns {
      display: flex;
      gap: 6px;
    }
    .sort-btn {
      padding: 4px 12px;
      border-radius: 14px;
      font-size: 12px;
      border: 1px solid rgba(0,0,0,0.12);
      background: transparent;
      color: #555;
      cursor: pointer;
    }
    .sort-btn.active {
      background: #1a6e5c;
      color: #fff;
      border-color: #1a6e5c;
    }
    #result-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .result-item-card {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      cursor: pointer;
      transition: background .12s;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .result-item-card:hover { background: rgba(26,110,92,0.05); }
    .result-item-card.active { background: rgba(26,110,92,0.10); }
    .result-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .result-item-body {
      flex: 1;
      min-width: 0;
    }
    .result-item-name {
      font-size: 13px;
      font-weight: 600;
      color: #1c1c1c;
    }
    .result-item-meta {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .result-item-breakdown {
      font-size: 10px;
      color: #aaa;
      margin-top: 3px;
    }

    /* 隐藏 leaflet 默认控件样式 */
    .leaflet-control-attribution { font-size: 9px !important; }
    /* 移动端适配 — 保持 PC 版风格，只缩小 */
    @media (max-width: 768px) {
      #map { width: 100%; }
      #result-panel {
        top: auto;
        bottom: -50vh;
        width: 100%;
        height: 50vh;
        transition: bottom .3s ease;
        border-radius: 16px 16px 0 0;
      }
      #result-panel.open { bottom: 0; }
      #result-panel-toggle {
        display: flex;
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 1002;
        padding: 10px 18px;
        background: #1a6e5c;
        color: #fff;
        border: none;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }
      .info-panel {
        right: 8px;
        bottom: 120px;
      }
    }

    @media (max-width: 640px) {
      .title-overlay {
        top: 176px;
        padding: 6px 14px;
        width: auto;
        max-width: calc(100vw - 16px);
        white-space: nowrap;
      }
      .title-overlay .en { font-size: 7px; }
      .title-overlay h1 { font-size: 15px; }
      .title-overlay .sub { font-size: 10px; }

      .control-card {
        top: 8px;
        left: 8px;
        right: 8px;
        width: auto;
        padding: 10px 12px;
      }
      .transport-row {
        gap: 4px;
      }
      .t-btn {
        font-size: 11px;
        padding: 4px 8px;
      }
      #search-results { max-height: 200px; }

      .legend {
        left: 6px;
        bottom: 60px;
        width: 70px;
        padding: 5px;
        font-size: 7px;
      }
      .legend h3 { font-size: 8px; margin-bottom: 3px; }
      .legend .item, .legend .band { gap: 3px; margin: 1px 0; }
      .legend .swatch { width: 10px; height: 6px; }
      .legend .line-swatch { width: 10px; }
      .legend .hatch { width: 10px; height: 6px; }

      .info-panel {
        max-width: 160px;
        padding: 8px 10px;
        font-size: 11px;
      }
      .loading-overlay { bottom: 10px; }
      .loading-box { font-size: 11px; padding: 5px 12px; }
    }

    /* ── 欢迎屏 ── */
    #welcome-screen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: #e8e4d8;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }
    #welcome-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #welcome-screen.hidden { display: none; }
    .welcome-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
      padding: 44px 48px 40px;
      width: 480px;
      max-width: 92vw;
      text-align: center;
    }
    .welcome-eyebrow {
      font: 700 11px/1 system-ui, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #1a6e5c;
      margin-bottom: 16px;
    }
    .welcome-headline {
      font: 900 26px/1.3 "Noto Serif SC", serif;
      color: #1c1c1c;
      margin-bottom: 10px;
    }
    .welcome-sub {
      font: 400 14px/1.6 system-ui, sans-serif;
      color: #888;
      margin-bottom: 28px;
    }
    .welcome-search-wrap {
      position: relative;
    }
    .welcome-search-wrap input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      font: 400 15px system-ui, sans-serif;
      color: #1c1c1c;
      outline: none;
    }
    .welcome-search-wrap input::placeholder { color: #aaa; }
    .welcome-search-wrap .welcome-search-icon {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #1a6e5c;
      font-size: 16px;
      pointer-events: none;
    }
    #welcome-results {
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
      margin-top: 6px;
      overflow: hidden;
      display: none;
      text-align: left;
    }
    #welcome-results .result-item {
      padding: 10px 16px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    #welcome-results .result-item:last-child { border-bottom: none; }
    #welcome-results .result-item:hover { background: rgba(26,110,92,0.08); }
    .welcome-quick {
      margin-top: 24px;
    }
    .welcome-quick-label {
      font: 400 12px system-ui, sans-serif;
      color: #aaa;
      margin-bottom: 10px;
    }
    .welcome-quick-cities {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .welcome-city-tag {
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(26,110,92,0.08);
      color: #1a6e5c;
      font: 600 13px "Noto Serif SC", serif;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .welcome-city-tag:hover {
      background: rgba(26,110,92,0.18);
    }
    .welcome-github {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2001;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font: 400 13px system-ui, -apple-system, sans-serif;
      color: #999;
      text-decoration: none;
      transition: color 0.15s, opacity 0.5s;
    }
    .welcome-github:hover { color: #1a6e5c; }
    .welcome-github svg { opacity: 0.7; }
    .welcome-github:hover svg { opacity: 1; }
    @media (max-width: 520px) {
      .welcome-card { padding: 32px 24px 28px; }
      .welcome-headline { font-size: 21px; }
    }
  </style>
</head>
<body>

<div id="welcome-screen">
  <div class="welcome-card">
    <div class="welcome-eyebrow" id="welcome-eyebrow">Drive Escape</div>
    <div class="welcome-headline" id="welcome-headline">Where can you escape by car?</div>
    <div class="welcome-sub" id="welcome-sub">Enter your city and explore how far you can drive in a weekend</div>
    <div class="welcome-search-wrap">
      <input type="text" id="welcome-input" autocomplete="off" spellcheck="false" placeholder="Search city..." />
      <span class="welcome-search-icon">⌕</span>
    </div>
    <div id="welcome-results"></div>
    <div class="welcome-quick">
      <div class="welcome-quick-label" id="welcome-quick-label">Popular cities</div>
      <div class="welcome-quick-cities" id="welcome-quick-cities"></div>
    </div>
  </div>
  <a class="welcome-github" href="https://github.com/arikatuo/drive-escape" target="_blank" rel="noopener">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    Open Source
  </a>
</div>

<div id="result-panel">
  <div id="result-panel-header">
    <span id="result-summary">选择城市后查询</span>
    <div id="result-sort-btns">
      <button class="sort-btn active" data-sort="time" onclick="setSort('time')">按时间</button>
      <button class="sort-btn" data-sort="distance" onclick="setSort('distance')">按距离</button>
    </div>
  </div>
  <div id="result-list"></div>
</div>

<div id="map"></div>

<div class="title-overlay" id="title-overlay-card">
  <div class="title-text">
    <div class="en">Weekend Self-Driving Escape Plan</div>
    <h1>周末自驾逃离计划</h1>
    <div class="sub" id="title-sub">...</div>
  </div>
</div>

<div class="control-card" id="control-card">
  <div class="ctrl-label">出发地</div>
  <div class="search-box" style="position:relative;margin-bottom:12px">
    <input type="text" id="city-search" placeholder="搜索城市或区县..." autocomplete="off" spellcheck="false"
      style="width:100%;padding:7px 12px;border:none;border-radius:8px;background:rgba(240,240,240,0.8);font-size:13px;outline:none;font-family:system-ui,-apple-system,sans-serif;" />
    <div id="search-results"
      style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(255,255,255,0.98);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.12);overflow:hidden;display:none;z-index:1100;max-height:240px;overflow-y:auto"></div>
  </div>
  <div class="ctrl-label">交通方式</div>

  // 重建快捷城市标签

}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', applyLang);
} else {
  applyLang();
}
</script>

// ── 全局状态 ──
let currentOrigin = [120.15, 30.26]; // [lng, lat]
let currentCityName = "";
let originAdcode = null;

let allCountyFeatures = [];
let allGrayFeatures = [];
let allCityOutlines = [];
let allGrayCityOutlines = [];

// ── 工具函数 ──
function haversine(lng1, lat1, lng2, lat2) {
  const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function estimateDriveTime(lng, lat) {
  const dist = haversine(currentOrigin[0], currentOrigin[1], lng, lat);
  const roadDist = Math.round(dist * 1.35);
  const time = Math.round(roadDist / 85 * 10) / 10;
  return { time, dist: roadDist };
}

function getFeatureCenter(feature) {
  const center = feature?.properties?.centroid || feature?.properties?.center;
  return Array.isArray(center) && center.length === 2 ? center : null;
}

function getDriveData(feature) {
  const code = String(feature?.properties?.adcode || "");
  if (driveDataMap[code]) return driveDataMap[code];
  const center = getFeatureCenter(feature);
  if (!center || center.length !== 2) return null;
  const est = estimateDriveTime(center[0], center[1]);
  return { name: feature?.properties?.name || "", time: est.time, dist: est.dist, estimated: true };
}

function isFeatureReachable(feature, includeOrigin = true) {
  const d = getDriveData(feature);
  if (!d) return false;
  const code = String(feature?.properties?.adcode || "");
  if (code === originAdcode) return includeOrigin;
  if (d.time > maxHours) return false;
  const center = getFeatureCenter(feature);
  if (!center) return false;
  return haversine(currentOrigin[0], currentOrigin[1], center[0], center[1]) <= MAX_STRAIGHT_KM;
}

function findCountyFeature(adcode) {
  const code = String(adcode || "");
  return allCountyFeatures.find(f => String(f?.properties?.adcode || "") === code) || null;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function getBandColor(time) {
  if (typeof time !== "number") return "#d3d3d3";
  for (const b of colorBands) {
    if (time >= b.min && time < b.max) return b.color;
  }
  return colorBands[colorBands.length - 1].color;
}

function fmtTime(t) {
  return typeof t !== "number" ? "--" : Number.isInteger(t) ? `${t}` : `${t.toFixed(1)}`;
}

function styleCounty(feature) {
  const d = getDriveData(feature);
  return {
    color: "#fff",
    weight: 1,
    opacity: 0.8,
    fillOpacity: 0.75,
    fillColor: d ? getBandColor(d.time) : "#d3d3d3"
  };
}

// ── Loading ──
const loadingEl = document.getElementById("loading");
const loadingText = document.getElementById("loading-text");

function showLoading(msg) {

  loadingText.textContent = msg;

}
function hideLoading() {

function showToast(msg, duration = 4000) {
  let el = document.getElementById("toast-msg");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast-msg";
    el.style.cssText = "position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;z-index:3000;pointer-events:none;transition:opacity .3s";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = "0"; }, duration);
}

// ── 信息面板 ──
const infoPanel = document.getElementById("info");
const infoName = document.getElementById("info-name");
const infoDetail = document.getElementById("info-detail");

function showInfo(dd) {
  if (!dd) { infoPanel.style.display = "none"; return; }
  const isOrigin = dd.isOrigin || dd.time === 0;
  infoName.textContent = isOrigin ? `🚗 ${dd.name}（${t('origin')}）` : dd.name;
  infoDetail.innerHTML = isOrigin
    ? `<span class="time">${t('originLabel')}</span>`
    : `<span class="time">🕐 ${fmtTime(dd.time)} ${t('timeUnit')}</span> · ${dd.dist} km${dd.estimated ? ' ' + t('estimated') : ''}`;
  if (currentTransport === "moto" && !isOrigin) {
    infoDetail.innerHTML += ` <span style="font-size:11px;color:#888">（参考汽车路况，近似值）</span>`;
  }
  if (currentTransport === "hsr" && dd.breakdown) {
    infoDetail.innerHTML += `<br><span style="font-size:11px;color:#666">接驳 ${dd.breakdown.toStation}m + 高铁 ${dd.breakdown.trainTime}m + 接驳 ${dd.breakdown.fromStation}m</span>`;
  }
  infoPanel.style.display = "block";
}

function restoreOriginHatch(layer) {
  if (!layer?._path || String(layer.feature?.properties?.adcode || "") !== originAdcode) return;
  layer._path.setAttribute("fill", "url(#originHatch)");
  layer._path.setAttribute("fill-opacity", "1");
}

function enableQueryBtn() {
  const btn = document.getElementById("query-btn");
  if (!btn) return;
  btn.disabled = false;
  setQueryBtnText("查询");
  btn.classList.remove("loading");
  btn.classList.add("ready");
}

function disableQueryBtn() {
  const btn = document.getElementById("query-btn");
  if (!btn) return;
  btn.disabled = true;
  setQueryBtnText("查询");
  btn.classList.remove("ready", "loading");
}

function setQueryBtnText(text) {
  const btn = document.getElementById("query-btn");
  if (btn) btn.textContent = text;
}

function queueCitySelection(name, lng, lat, cc, opts = {}) {
  if (opts.dismissWelcome) dismissWelcome();
  pendingCity = { name, lng, lat, cc: cc || "cn" };
  hasQueried = false;
  selectedCountyAdcode = null;
  currentCityName = name;
  currentCountryCode = cc || "cn";
  searchInput.value = name;
  searchResults.style.display = "none";
  const welcomeInput = document.getElementById("welcome-input");
  if (welcomeInput) welcomeInput.value = name;
  enableQueryBtn();
  updateTitleSub();
  renderResultList();
}

function finalizeQueryState() {
  hasQueried = true;
  pendingCity = null;
  disableQueryBtn();
  renderResultList();
}

function onQueryClick() {
  if (!pendingCity) return;
  const btn = document.getElementById("query-btn");
  if (btn) {
    setQueryBtnText("准备查询...");
    btn.classList.add("loading");
  }
  const { name, lng, lat, cc } = pendingCity;
  showLoading(t("loading"));
  switchCity(name, lng, lat, cc).finally(() => {
    if (btn) {
      setQueryBtnText("查询");
      btn.classList.remove("loading");
    }
  });
}

function syncResultCardSelection(adcode, scroll = false) {
  document.querySelectorAll(".result-item-card").forEach(card => {
    const isTarget = card.dataset.adcode === String(adcode || "");
    card.classList.toggle("active", isTarget);
    if (isTarget && scroll) {
      card.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  });
}

function clearCountyHighlight() {
  selectedCountyAdcode = null;
  if (currentCountyLayer) {
    currentCountyLayer.eachLayer(layer => {
      currentCountyLayer.resetStyle(layer);
      restoreOriginHatch(layer);
    });
  }
  syncResultCardSelection("");
  infoPanel.style.display = "none";
}

function highlightCounty(adcode, feature, options = {}) {
  const code = String(adcode || "");
  if (!code) return;
  selectedCountyAdcode = code;
  let targetLayer = null;
  if (currentCountyLayer) {
    currentCountyLayer.eachLayer(layer => {
      currentCountyLayer.resetStyle(layer);
      const layerCode = String(layer.feature?.properties?.adcode || "");
      if (layerCode === code) {
        layer.setStyle({ weight: 3, color: "#1a6e5c", fillOpacity: 0.9 });
        layer.bringToFront();
        targetLayer = layer;
      } else {
        restoreOriginHatch(layer);
      }
    });
    activeLayers.forEach(layer => {
      if (layer._isCityBorder || layer._isProvBorder) layer.bringToFront();
    });
  }
  if (targetLayer && options.fit !== false) {
    map.fitBounds(targetLayer.getBounds(), {
      paddingTopLeft: [40, 40],
      paddingBottomRight: [window.innerWidth <= 768 ? 40 : 320, 40],
      maxZoom: 10
    });
  }
  if (targetLayer && code === originAdcode) restoreOriginHatch(targetLayer);
  syncResultCardSelection(code, options.scroll === true);
  const item = feature || findCountyFeature(code);
  if (item) showInfo(getDriveData(item));
  if (window.innerWidth <= 768 && options.openPanel) {
    document.getElementById("result-panel")?.classList.add("open");
  }
}

function setSort(type) {
  currentSort = type;
  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.sort === type);
  });
  renderResultList();
}

function renderResultList() {
  const list = document.getElementById("result-list");
  const summary = document.getElementById("result-summary");
  if (!list) return;

  if (!hasQueried || !allCountyFeatures.length) {
    list.innerHTML = "";
    if (summary) {
      summary.textContent = pendingCity
        ? `已选择 ${pendingCity.name}，点击查询`
        : "选择城市后查询";
    }
    return;
  }

  const items = allCountyFeatures
    .filter(feature => isFeatureReachable(feature, false))
    .map(feature => {
      const code = String(feature?.properties?.adcode || "");
      const data = getDriveData(feature);
      if (!data) return null;
      return {
        code,
        name: data.name || feature?.properties?.name || "",
        time: data.time,
        dist: data.dist,
        estimated: !!data.estimated,
        breakdown: data.breakdown || null,
        feature
      };
    })
    .filter(Boolean);

  items.sort((a, b) => {
    const primary = currentSort === "time"
      ? a.time - b.time
      : (a.dist || 9999) - (b.dist || 9999);
    if (primary !== 0) return primary;
    const aIsDistrict = String(a.code).slice(-2) === "00" ? 0 : 1;
    const bIsDistrict = String(b.code).slice(-2) === "00" ? 0 : 1;
    return aIsDistrict - bIsDistrict;
  });

  if (summary) {
    const transportLabel = { car: "汽车", moto: "摩托", bike: "自行车", hsr: "高铁" };
    summary.textContent = items.length
      ? `${maxHours}小时内 ${transportLabel[currentTransport] || ""} 可达 ${items.length} 个区县`
      : "暂无可达数据";
  }

  if (items.length === 0) {
    list.innerHTML = `<div style="padding:24px 14px;text-align:center;color:#bbb"><div style="font-size:24px;margin-bottom:8px">🗺️</div><div style="font-size:13px">${maxHours}小时内暂无可达区县<br><span style="font-size:11px">试试增加时间或切换交通方式</span></div></div>`;
    if (summary) summary.textContent = "暂无可达区县";
    return;
  }

  list.innerHTML = "";
  items.forEach(item => {
    const card = document.createElement("div");
    card.className = "result-item-card";
    card.dataset.adcode = item.code;

    let metaText = `${fmtTime(item.time)}h`;
    if (item.dist) metaText += ` / ${item.dist}km`;
    if (item.estimated) metaText += " (估算)";

    let breakdownHtml = "";
    if (item.breakdown) {
      const { toStation, trainTime, fromStation, oSt, dSt } = item.breakdown;
      breakdownHtml = `<div class="result-item-breakdown">去${escapeHtml(oSt)} ${escapeHtml(toStation)}分 + 高铁 ${escapeHtml(trainTime)}分 + 离${escapeHtml(dSt)} ${escapeHtml(fromStation)}分</div>`;
    }

    const cityname = item.feature?.properties?.cityname || "";
    const cityHint = cityname && cityname !== item.name
      ? `<span style="font-size:10px;color:#aaa;margin-left:4px">${escapeHtml(cityname)}</span>`
      : "";

    card.innerHTML = `
      <span class="result-color-dot" style="background:${getBandColor(item.time)}"></span>
      <div class="result-item-body">
        <div class="result-item-name">${escapeHtml(item.name)}${cityHint}</div>
        <div class="result-item-meta">
          <span>${metaText}</span>
          <span>${currentTransport === "hsr" ? "高铁" : currentTransport === "bike" ? "骑行" : currentTransport === "moto" ? "摩托(估)" : "驾车"}</span>
        </div>
        ${breakdownHtml}
      </div>
    `;

    card.addEventListener("click", () => {
      highlightCounty(item.code, item.feature, { fit: true, scroll: false, openPanel: true });
    });
    list.appendChild(card);
  });

  syncResultCardSelection(selectedCountyAdcode, false);
}

// ── 标签 ──
function updateLabels() {
  labelLayer.clearLayers();
  const zoom = map.getZoom();
  const bounds = map.getBounds();
  const placed = [];

  const allFeatures = [
    ...allCountyFeatures.filter(f => isFeatureReachable(f, true)).map(f => ({ f, core: true })),
    ...allGrayFeatures.map(f => ({ f, core: false }))
  ];

  allFeatures.sort((a, b) => {
    const da = getDriveData(a.f);
    const db = getDriveData(b.f);
    if (String(a.f?.properties?.adcode) === originAdcode) return -1;
    if (String(b.f?.properties?.adcode) === originAdcode) return 1;
    if (a.core && !b.core) return -1;
    if (!a.core && b.core) return 1;
    return (da?.time || 99) - (db?.time || 99);
  });

  // detail: 0=名字, 1=名字+耗时, 2=名字+耗时+距离
  const cfg = zoom >= 11 ? { fs: 11, fsGray: 9, minD: 12, detail: 2 }
            : zoom >= 10 ? { fs: 10, fsGray: 8, minD: 16, detail: 2 }
            : zoom >= 9  ? { fs: 9,  fsGray: 7, minD: 18, detail: 2 }
            : zoom >= 8  ? { fs: 8,  fsGray: 6, minD: 14, detail: 1 }
            : zoom >= 7  ? { fs: 7,  fsGray: 5, minD: 10, detail: 1 }
            :              { fs: 6,  fsGray: 5, minD: 8,  detail: 0 };

  for (const { f, core } of allFeatures) {
    const driveInfo = getDriveData(f);
    const name = driveInfo?.name || f?.properties?.name || "";
    if (!name) continue;

    const center = f?.properties?.centroid || f?.properties?.center;
    if (!center || center.length !== 2) continue;
    const ll = L.latLng(center[1], center[0]);
    if (!bounds.contains(ll)) continue;

    const pt = map.latLngToContainerPoint(ll);
    if (placed.some(p => Math.abs(p.x - pt.x) < cfg.minD && Math.abs(p.y - pt.y) < cfg.minD)) continue;
    placed.push(pt);

    let text, fs, cls;
    if (core && driveInfo) {
      fs = cfg.fs;
      cls = "county-label";
      if (cfg.detail >= 2) {
        text = `${name}\n${fmtTime(driveInfo.time)}h / ${driveInfo.dist}km`;
      } else if (cfg.detail >= 1) {
        text = `${name}\n${fmtTime(driveInfo.time)}h`;
      } else {
        text = name;
      }
    } else {
      fs = cfg.fsGray;
      cls = "county-label gray";
      text = name;
    }

    L.marker(ll, {
      interactive: false,
      icon: L.divIcon({
        className: cls,
        html: `<span style="font-size:${fs}px">${text}</span>`,
        iconSize: [1,1]
      })
    }).addTo(labelLayer);
  }
}

function amapPolylineToGeoJSON(districts) {
  return districts
    .filter(d => d.polyline)
    .map(d => {
      const rings = d.polyline
        .split("|")
        .map(ring => ring.split(";").map(pt => pt.split(",").map(Number)).filter(pt => pt.length === 2 && Number.isFinite(pt[0]) && Number.isFinite(pt[1])))
        .filter(ring => ring.length >= 3)
        .map(ring => {
          const first = ring[0];
          const last = ring[ring.length - 1];
          if (first[0] !== last[0] || first[1] !== last[1]) ring.push([...first]);
          return ring;
        });
      if (!rings.length) return null;
      const centroid = d.center ? d.center.split(",").map(Number) : d.centroid ? d.centroid.split(",").map(Number) : null;
      return {
        type: "Feature",
        properties: {
          adcode: d.adcode,
          name: d.name,
          cityname: Array.isArray(d.cityname) ? d.cityname.filter(Boolean).join("") : (d.cityname || ""),
          level: d.level || "district",
          centroid,
          center: centroid
        },
        geometry: {
          type: "Polygon",
          coordinates: rings
        }
      };
    })
    .filter(Boolean);
}

function buildGeoFeatureFromAmapDistrict(district, extraProps = {}) {
  const [feature] = amapPolylineToGeoJSON(district ? [district] : []);
  if (!feature) return null;
  feature.properties = { ...feature.properties, ...extraProps };
  return feature;
}

const PRESET_CITIES = {
  "北京": "beijing",
  "上海": "shanghai",
  "杭州": "hangzhou",
  "成都": "chengdu",
  "西安": "xian"
};
const MOTO_SPEED_FACTOR = 0.9;

function applyMotoFactorToDriveData(driveData) {
  const adjusted = {};
  for (const [code, data] of Object.entries(driveData || {})) {
    if (!data || typeof data !== "object") continue;
    const t = Number(data.time);
    adjusted[code] = {
      ...data,
      time: Number.isFinite(t) ? Math.round(t * MOTO_SPEED_FACTOR * 10) / 10 : data.time
    };
  }
  return adjusted;
}

async function fetchTransportTimes(origin, districts) {
  const dests = districts
    .map(d => d?.properties?.centroid || d?.properties?.center)
    .filter(c => c && c.length === 2)
    .map(c => `${c[0]},${c[1]}`);

  if (!dests.length) return {};

  if (currentTransport === "car" || currentTransport === "moto") {
    const res = await fetch("/api/drive", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        origin: `${origin[0]},${origin[1]}`,
        destinations: dests,
        cityAdcode: originAdcode || ""
      })
    });
    return res.json();
  }

  if (currentTransport === "bike") {
    const bikeDests = districts
      .map(d => getFeatureCenter(d))
      .filter(center => {
        if (!center) return false;
        return haversine(currentOrigin[0], currentOrigin[1], center[0], center[1]) <= 150;
      })
      .map(center => `${center[0]},${center[1]}`);
    if (!bikeDests.length) return {};
    const res = await fetch("/api/bike", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        origin: `${origin[0]},${origin[1]}`,
        destinations: bikeDests
      })
    });
    return res.json();
  }

  const res = await fetch("/api/transit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      originLng: origin[0],
      originLat: origin[1],
      originCity: currentCityName,
      districts: districts.map(d => {
        const c = d?.properties?.centroid || d?.properties?.center;
        return { adcode: d?.properties?.adcode, lng: c?.[0], lat: c?.[1], name: d?.properties?.name || "" };
      }).filter(d => Number.isFinite(d.lng) && Number.isFinite(d.lat))
    })
  });
  return res.json();
}

// 兼容旧的海外/历史数据加载逻辑
function geoURL(code) {
  return `https://geo.datav.aliyun.com/areas_v3/bound/${code}_full.json`;
}

async function fetchJSON(url, timeoutMs = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!r.ok) throw new Error(url);
    return r.json();
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

// 并发控制：最多同时 N 个请求
async function parallelLimit(tasks, limit = 5) {
  const results = [];
  let i = 0;
  async function worker() {
    while (i < tasks.length) {
      const idx = i++;
      results[idx] = await tasks[idx]();
    }
  }
  await Promise.all(Array.from({ length: Math.min(limit, tasks.length) }, () => worker()));
  return results;
}

// 加载省下面所有市 → 每个市的区县
// 直辖市 adcode（省级 _full 直接返回区级，不需要再往下钻）
const DIRECT_MUNICIPALITIES = new Set([110000, 120000, 310000, 500000]);

async function loadProvinceCounties(provAdcode) {
  try {
    const json = await fetchJSON(geoURL(provAdcode));
    const features = json.features || [];
    const provOutline = features.find(f => Number(f?.properties?.adcode) === provAdcode) || null;
    const cities = features.filter(f => Number(f?.properties?.adcode || 0) !== provAdcode);

    // 直辖市：省级 _full 返回的子级就是区，直接用
    if (DIRECT_MUNICIPALITIES.has(provAdcode)) {
      return {
        provAdcode, provOutline,
        cityResults: [{ adcode: provAdcode, counties: cities, outline: provOutline }]
      };
    }

    // 普通省：并发限制加载每个市的区县（最多5个同时）
    const cityTasks = cities.map(city => async () => {
      const cityCode = Number(city?.properties?.adcode);
      try {
        const cj = await fetchJSON(geoURL(cityCode));
        const counties = (cj.features || []).filter(f => {
          const parent = Number(f?.properties?.parent?.adcode || 0);
          return parent === cityCode;
        });
        return { adcode: cityCode, counties, outline: city };
      } catch(e) {
        return { adcode: cityCode, counties: [], outline: city };
      }
    });
    const cityResults = await parallelLimit(cityTasks, 5);

    return { provAdcode, provOutline, cityResults };
  } catch(e) {
    return { provAdcode, provOutline: null, cityResults: [] };
  }
}

// 加载省级轮廓（市级，不展开区县）
async function loadProvinceCities(provAdcode) {
  try {
    const json = await fetchJSON(geoURL(provAdcode));
    const features = json.features || [];
    const provOutline = features.find(f => Number(f?.properties?.adcode) === provAdcode) || null;
    const cities = features.filter(f => Number(f?.properties?.adcode || 0) !== provAdcode);
    return { provAdcode, provOutline, cities };
  } catch(e) {
    return { provAdcode, provOutline: null, cities: [] };
  }
}

// ── OSRM 批量驾车时间 ──
async function fetchOSRMBatch(originLng, originLat, destinations) {
  // destinations: [{ adcode, lng, lat, name }]
  // 每批最多 50 个
  const results = {};
  const batchSize = 50;

  for (let i = 0; i < destinations.length; i += batchSize) {
    const batch = destinations.slice(i, i + batchSize);
    const coords = `${originLng},${originLat};` + batch.map(d => `${d.lng},${d.lat}`).join(";");
    const destIndices = batch.map((_, j) => j + 1).join(";");
    const url = `https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&destinations=${destIndices}&annotations=duration,distance`;

    try {
      const res = await fetch(url);
      const data = await res.json();
      if (data.code === "Ok") {
        const durations = data.durations[0];
        const distances = data.distances[0];
        batch.forEach((d, j) => {
          const timeSec = durations[j];
          const distM = distances[j];
          if (timeSec != null && timeSec > 0) {
            results[d.adcode] = {
              name: d.name,
              time: Math.round(timeSec / 360) / 10,
              dist: Math.round(distM / 1000)
            };
          }
        });
      }
    } catch(e) {}

    // 批次间间隔
    if (i + batchSize < destinations.length) {
      await new Promise(r => setTimeout(r, 500));
    }
  }
  return results;
}

// ── 渲染地图 ──
function renderMap(skipFitBounds = false) {
  // 清除旧图层（OSRM 刷新时需要重新渲染）
  const savedProvOutlines = activeLayers._provOutlines;
  // 暴力清除所有非底图图层，确保没有残留色块
  map.eachLayer(layer => {
    if (layer !== labelLayer && !layer._url) { // 保留 tileLayer（有 _url）和 labelLayer
      map.removeLayer(layer);
    }
  });
  activeLayers = [];
  activeLayers._provOutlines = savedProvOutlines;
  labelLayer.clearLayers();
  currentCountyLayer = null;
  selectedCountyAdcode = null;
  syncResultCardSelection("");

  // 找 origin adcode
  originAdcode = null;
  let minDist = Infinity;
  for (const f of allCountyFeatures) {
    const c = f?.properties?.centroid || f?.properties?.center;
    if (c) {
      const d = haversine(currentOrigin[0], currentOrigin[1], c[0], c[1]);
      if (d < minDist) { minDist = d; originAdcode = String(f?.properties?.adcode || ""); }
    }
  }

  // 标记 origin
  if (originAdcode && driveDataMap[originAdcode]) {
    driveDataMap[originAdcode].isOrigin = true;
    driveDataMap[originAdcode].time = 0;
    driveDataMap[originAdcode].dist = 0;
  }

  // 灰色背景
  if (allGrayFeatures.length) {
    const grayLayer = L.geoJSON({ type: "FeatureCollection", features: allGrayFeatures }, {
      style: {
        color: "#ccc",
        weight: 0.5,
        opacity: 0.5,
        fillColor: "#e5e2da",
        fillOpacity: 0.45
      },
      onEachFeature(feature, layer) {
        const name = feature?.properties?.name || "";
        if (name) layer.bindTooltip(name, { sticky: true });
      }
    }).addTo(map);
    activeLayers.push(grayLayer);
  }

  // 灰色区域的市界
  if (allGrayCityOutlines.length) {
    const grayBorderLayer = L.geoJSON({ type: "FeatureCollection", features: allGrayCityOutlines.filter(Boolean) }, {
      style: { color: "rgba(255,255,255,0.5)", weight: 1.5, opacity: 0.6, fill: false },
      interactive: false
    }).addTo(map);
    activeLayers.push(grayBorderLayer);
  }

  // 过滤掉超过 MAX_DRIVE_HOURS 或直线距离过远的区县（避免飞地）
  const visibleFeatures = allCountyFeatures.filter(f => isFeatureReachable(f, true));

  // 县区填充层
  const countyLayer = L.geoJSON({ type: "FeatureCollection", features: visibleFeatures }, {
    style: styleCounty,
    onEachFeature(feature, layer) {
      const code = String(feature?.properties?.adcode || "");
      const isOriginCounty = (code === originAdcode);

      layer.on("mouseover", () => {
        layer.setStyle({ weight: 2.5, color: "#333", fillOpacity: 0.9 });
        layer.bringToFront();
        activeLayers.forEach(l => { if (l._isCityBorder || l._isProvBorder) l.bringToFront(); });
        showInfo(getDriveData(feature));
      });
      layer.on("mouseout", () => {
        if (selectedCountyAdcode === code) {
          highlightCounty(code, feature, { fit: false, scroll: false });
        } else {
          countyLayer.resetStyle(layer);
          restoreOriginHatch(layer);
          infoPanel.style.display = "none";
        }
      });
      layer.on("click", e => {
        L.DomEvent.stopPropagation(e);
        highlightCounty(code, feature, { fit: false, scroll: true, openPanel: true });
      });

      if (isOriginCounty) {
        layer.on("add", () => {
          restoreOriginHatch(layer);
        });
      }
    }
  }).addTo(map);
  activeLayers.push(countyLayer);
  currentCountyLayer = countyLayer;

  // 点击地图关闭面板
  map.on("click", () => {
    clearCountyHighlight();
  });
  map.getContainer().addEventListener("mouseleave", () => {
    if (!selectedCountyAdcode) infoPanel.style.display = "none";
  });

  // 市界
  const cityBorderLayer = L.geoJSON({ type: "FeatureCollection", features: allCityOutlines.filter(Boolean) }, {
    style(f) {
      const originCityCode = originAdcode ? Number(originAdcode.slice(0,4) + "00") : 0;
      const isOrigin = Number(f?.properties?.adcode) === originCityCode;
      return { color: isOrigin ? "#e88" : "rgba(255,255,255,0.5)", weight: isOrigin ? 2.5 : 1.5, opacity: isOrigin ? 0.8 : 0.6, fill: false };
    },
    interactive: false
  }).addTo(map);
  cityBorderLayer._isCityBorder = true;
  activeLayers.push(cityBorderLayer);

  // 省界
  const provinceOutlines = activeLayers._provOutlines || [];
  if (provinceOutlines.length) {
    const provBorderLayer = L.geoJSON({ type: "FeatureCollection", features: provinceOutlines }, {
      style: { color: "#888", weight: 2, dashArray: "6 6", fill: false, opacity: 0.8 },
      interactive: false
    }).addTo(map);
    provBorderLayer._isProvBorder = true;
    activeLayers.push(provBorderLayer);
  }

  // SVG hatch
  setTimeout(() => {
    const svg = map.getPanes().overlayPane.querySelector("svg");
    if (svg) {
      let defs = svg.querySelector("defs") || svg.insertBefore(document.createElementNS("http://www.w3.org/2000/svg", "defs"), svg.firstChild);
      if (!svg.querySelector("#originHatch")) {
        const pat = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
        pat.setAttribute("id", "originHatch");
        pat.setAttribute("patternUnits", "userSpaceOnUse");
        pat.setAttribute("width", "8");
        pat.setAttribute("height", "8");
        pat.setAttribute("patternTransform", "rotate(45)");
        const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        bg.setAttribute("width", "8"); bg.setAttribute("height", "8"); bg.setAttribute("fill", "#fff");
        const ln = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        ln.setAttribute("x", "0"); ln.setAttribute("y", "0");
        ln.setAttribute("width", "4"); ln.setAttribute("height", "8"); ln.setAttribute("fill", "#aa2211");
        pat.appendChild(bg); pat.appendChild(ln);
        defs.appendChild(pat);
      }
    }
  }, 200);

  // fitBounds（仅首次渲染，OSRM 刷新时不动视野）— 只基于可见区县
  if (!skipFitBounds && visibleFeatures.length) {
    const fitBounds = L.latLngBounds();
    visibleFeatures.forEach(f => {
      const c = getFeatureCenter(f);
      if (c) fitBounds.extend(L.latLng(c[1], c[0]));
    });
    if (fitBounds.isValid()) {
      map.fitBounds(fitBounds, {
        paddingTopLeft: [30, 30],
        paddingBottomRight: [window.innerWidth <= 768 ? 30 : 310, 30]
      });
    }
  }

  updateLabels();
  map.off("zoomend moveend", updateLabels);
  map.on("zoomend moveend", updateLabels);
}

// ── 城市切换核心逻辑 ──
// 用 Overpass 查 place=city node 获取城市核心坐标（政治经济中心而非几何中心）
async function getCityCenter(name, lng, lat) {
  try {
    const r = 0.5; // 搜索半径 ~50km
    const query = `[out:json][timeout:5];node["place"~"city|town"]["name"~"${name}"](${lat-r},${lng-r},${lat+r},${lng+r});out 1;`;
    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST", body: "data=" + encodeURIComponent(query)
    });
    const data = await res.json();
    if (data.elements && data.elements.length > 0) {
      const e = data.elements[0];
      return [e.lon, e.lat];
    }
  } catch(e) {}
  return null; // fallback 用原坐标
}

async function switchCity(name, lng, lat, countryCode, forceReload = false) {
  // 新的 AbortController，取消旧请求
  if (currentCityAbortController) currentCityAbortController.abort();
  currentCityAbortController = new AbortController();
  const signal = currentCityAbortController.signal;
  selectedCountyAdcode = null;

  // 0. 校准城市中心坐标（Nominatim 对大面积城市返回几何中心，不是主城区）
  const corrected = CITY_CENTERS[name] || CITY_CENTERS[name.replace(/市$/, '').replace(/白族自治州$/, '').replace(/自治州$/, '')];
  if (corrected) {
    lng = corrected[0]; lat = corrected[1];
  } else {
    const osm = await getCityCenter(name.replace(/市$/, ''), lng, lat);
    if (osm) { lng = osm[0]; lat = osm[1]; }
  }

  // 1. 清除旧图层
  for (const layer of activeLayers) {
    map.removeLayer(layer);
  }
  activeLayers = [];
  labelLayer.clearLayers();
  map.off("click");
  infoPanel.style.display = "none";

  // 2. 更新 origin
  currentOrigin = [lng, lat];
  currentCityName = name;
  currentCountryCode = countryCode || "cn";

  // 3. 更新标题 + URL（四处同步）
  document.getElementById("legend-origin").textContent = t('originCity', { city: name });
  document.title = t('pageTitle', { city: name });
  updateTitleSub();
  updateURL(name);

  // 4. loading
  showLoading(t('loading'));
  setQueryBtnText("加载区划...");

  // 5. 判断是否在中国范围内
  const isChina = countryCode === 'cn' || (!countryCode && lat > 17 && lat < 55 && lng > 73 && lng < 136);

  allCountyFeatures = [];
  allGrayFeatures = [];
  allCityOutlines = [];
  allGrayCityOutlines = [];
  driveDataMap = {};
  const provinceOutlines = [];

  if (isChina) {
    const presetKey = PRESET_CITIES[name] || PRESET_CITIES[name.replace(/市$/, "")];
    if (presetKey && (currentTransport === "car" || currentTransport === "moto")) {
      try {
        showLoading("加载预设数据...");
        setQueryBtnText("加载预设...");
        const presetRes = await fetch(`/data/${presetKey}.json`, { signal });
        const preset = await presetRes.json();
        if (preset?.features && preset?.driveData) {
          currentOrigin = [lng, lat];
          currentCityName = name;
          currentCountryCode = "cn";
          allCountyFeatures = preset.features;
          allGrayFeatures = [];
          driveDataMap = currentTransport === "moto"
            ? applyMotoFactorToDriveData(preset.driveData)
            : preset.driveData;
          originAdcode = String(preset.features[0]?.properties?.adcode || "").slice(0, 4) + "0000";
          renderMap();
          finalizeQueryState();
          hideLoading();
          return;
        }
      } catch (e) {
        // Fall through to the real-time API path.
      }
    }

    const geoRes = await fetch(`/api/geo?keywords=${encodeURIComponent(name)}`, { signal });
    const geoData = await geoRes.json();
    if (geoData?.error) {
      setQueryBtnText("查询");
      hideLoading();
      return;
    }
    let districtGeoData = geoData;
    let geoDistricts = geoData.districts || [];
    const parentCityKeyword = Array.isArray(geoData.city?.cityname)
      ? geoData.city.cityname.filter(Boolean).join("")
      : (geoData.city?.cityname || "");
    if ((geoData.city?.level === "district" || !geoDistricts.length) && (parentCityKeyword || name)) {
      try {
        const parentKeyword = parentCityKeyword || name;
        const parentRes = await fetch(`/api/geo?keywords=${encodeURIComponent(parentKeyword)}`, { signal });
        const parentData = await parentRes.json();
        if (parentData?.districts?.length) {
          districtGeoData = parentData;
          geoDistricts = parentData.districts;
        }
      } catch (e) {
        // Fall through to the original district list if the parent lookup fails.
      }
    }
    allCountyFeatures = amapPolylineToGeoJSON(geoDistricts);
    if (!allCountyFeatures.length) {
      setQueryBtnText("查询");
      hideLoading();
      return;
    }

    const cityOutline = buildGeoFeatureFromAmapDistrict(districtGeoData.city, {
      name: districtGeoData.city?.name || name,
      adcode: districtGeoData.city?.adcode || ""
    });
    if (cityOutline) allCityOutlines = [cityOutline];

    const provinceOutline = buildGeoFeatureFromAmapDistrict(districtGeoData.province, {
      name: districtGeoData.province?.name || "",
      adcode: districtGeoData.province?.adcode || ""
    });
    if (provinceOutline) provinceOutlines.push(provinceOutline);

    for (const feature of allCountyFeatures) {
      const code = String(feature?.properties?.adcode || "");
      const cname = feature?.properties?.name || "";
      const center = feature?.properties?.centroid || feature?.properties?.center;
      if (!center) continue;
      const est = estimateDriveTime(center[0], center[1]);
      driveDataMap[code] = { name: cname, time: est.time, dist: est.dist, estimated: true };
    }

    renderMap();
    hideLoading();

    setQueryBtnText(
      currentTransport === "bike"
        ? "计算骑行..."
        : currentTransport === "hsr"
        ? "计算高铁..."
        : "计算驾车..."
    );
    showLoading(
      currentTransport === "bike"
        ? "正在计算骑行时间..."
        : currentTransport === "hsr"
        ? "正在计算高铁时间..."
        : t('loadingDriveTime', { done: '0', total: '1' })
    );
    const transportData = await fetchTransportTimes(currentOrigin, allCountyFeatures);
    if (transportData?.fallback) {
      showToast("高德 API 今日配额已用完，当前使用估算数据");
      renderMap(true);
      finalizeQueryState();
      hideLoading();
      return;
    }
    for (const feature of allCountyFeatures) {
      const code = String(feature?.properties?.adcode || "");
      const center = feature?.properties?.centroid || feature?.properties?.center;
      if (!center) continue;
      const centerKey = `${center[0]},${center[1]}`;

      if (currentTransport === "hsr") {
        const hsr = transportData[code];
        if (hsr) {
          driveDataMap[code] = {
            ...driveDataMap[code],
            time: hsr.time,
            estimated: false,
            breakdown: hsr.breakdown
          };
        }
      } else {
        const rt = transportData[centerKey];
        if (rt) {
          const baseHour = Math.round((rt.duration / 60) * 10) / 10;
          const correctedHour = currentTransport === "moto"
            ? Math.round(baseHour * MOTO_SPEED_FACTOR * 10) / 10
            : baseHour;
          driveDataMap[code] = {
            ...driveDataMap[code],
            time: correctedHour,
            dist: rt.distance,
            estimated: currentTransport === "moto"
          };
        }
      }
    }

    renderMap(true);
    finalizeQueryState();
    setQueryBtnText("查询");
    hideLoading();
    return;
  } else {
    // 海外：用 Overpass API 获取行政边界
    showLoading(t('loadingOverseas'));

    // 根据国家选择合适的行政级别
    const isJapan = countryCode === 'jp';
    const isAustralia = countryCode === 'au';
    // 欧洲国家列表（level 8 = 市/区/镇，统一处理）
    const EUROPE_CODES = new Set(['gb','fr','de','it','es','pt','nl','be','at','ch','pl','cz','se','no','dk','fi','ie','hu','ro','bg','hr','sk','si','lt','lv','ee','lu','gr']);
    const isEurope = EUROPE_CODES.has(countryCode);

    const queries = isJapan ? [
      // 日本：level 4 = 都道府県, level 7 = 市区町村, level 8 = 区/町（より詳細）
      { radius: 400000, levels: "4", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "7", labelKey: "loadingDetail" },
      { radius: 200000, levels: "8", labelKey: "loadingDetail" }
    ] : isAustralia ? [
      // 澳大利亚：level 6 = Local Government Area（Council），半径缩小避免数据过大
      { radius: 300000, levels: "6", labelKey: "loadingAdmin" }
    ] : isEurope ? [
      // 欧洲：level 4 补充城市州(柏林/汉堡等), level 6 = 省/郡, level 8 = 市镇/Borough
      { radius: 100000, levels: "4|5", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "6", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "8", labelKey: "loadingDetail" }
    ] : [
      // 其他国家
      { radius: 400000, levels: "5|6", labelKey: "loadingAdmin" },
      { radius: 400000, levels: "4", labelKey: "loadingAdmin", fallback: true },
      { radius: 300000, levels: "7", labelKey: "loadingDetail" },
      { radius: 150000, levels: "8", labelKey: "loadingDetail" }
    ];

    for (const q of queries) {
      // fallback 查询只在前面数据太少时才执行
      if (q.fallback && allCountyFeatures.length >= 10) continue;
      showLoading(t(q.labelKey));
      const query = `[out:json][timeout:90];
        relation["boundary"="administrative"]["admin_level"~"^(${q.levels})$"]
        (around:${q.radius},${lat},${lng});
        out geom;`;

      try {
        const res = await fetch("https://overpass-api.de/api/interpreter", {
          method: "POST",
          body: "data=" + encodeURIComponent(query)
        });
        const data = await res.json();

        if (data.elements) {
          const seenIds = new Set(allCountyFeatures.map(f => f.properties.adcode));

          data.elements.forEach(el => {
            if (el.type !== "relation" || !el.members) return;
            const rCode = String(el.id);
            if (seenIds.has(rCode)) return; // 去重

            // 从 Overpass geom 构建 GeoJSON — 合并 outer ways 成环
            const outerWays = el.members.filter(m => m.type === "way" && m.role === "outer" && m.geometry);
            if (!outerWays.length) return;

            // 将多个 way 首尾相连成完整环（健壮版）
            const segments = outerWays.map(w => w.geometry.map(p => [p.lon, p.lat]));
            const rings = [];

            function ptsClose(a, b) {
              return Math.abs(a[0]-b[0]) < 0.0001 && Math.abs(a[1]-b[1]) < 0.0001;
            }

            const remaining = segments.map((s,i) => i);
            while (remaining.length > 0) {
              let ring = [...segments[remaining.shift()]];
              let changed = true;
              while (changed) {
                changed = false;
                for (let j = remaining.length - 1; j >= 0; j--) {
                  const seg = segments[remaining[j]];
                  const rEnd = ring[ring.length - 1];
                  const rStart = ring[0];
                  if (ptsClose(rEnd, seg[0])) {
                    ring.push(...seg.slice(1));
                    remaining.splice(j, 1); changed = true;
                  } else if (ptsClose(rEnd, seg[seg.length - 1])) {
                    ring.push(...[...seg].reverse().slice(1));
                    remaining.splice(j, 1); changed = true;
                  } else if (ptsClose(rStart, seg[seg.length - 1])) {
                    ring.unshift(...seg.slice(0, -1));
                    remaining.splice(j, 1); changed = true;
                  } else if (ptsClose(rStart, seg[0])) {
                    ring.unshift(...[...seg].reverse().slice(0, -1));
                    remaining.splice(j, 1); changed = true;
                  }
                }
              }
              rings.push(ring);
            }

            // 如果拼接完全失败，用各段单独作为 polygon
            if (!rings.length && segments.length) {
              segments.forEach(s => rings.push(s));
            }
            if (!rings.length) return;

            const geom = rings.length === 1
              ? { type: "Polygon", coordinates: [rings[0]] }
              : { type: "MultiPolygon", coordinates: rings.map(r => [r]) };

            // 计算质心
            const allPts = rings[0];
            let sumLng = 0, sumLat = 0;
            allPts.forEach(c => { sumLng += c[0]; sumLat += c[1]; });
            const centroid = [sumLng / allPts.length, sumLat / allPts.length];

            // 名称优先级：中文 > 英文 > 原名
            const rName = el.tags?.["name:zh"] || el.tags?.["name:en"] || el.tags?.name || "";
            const est = estimateDriveTime(centroid[0], centroid[1]);

            allCountyFeatures.push({
              type: "Feature",
              properties: { name: rName, adcode: rCode, centroid, center: centroid },
              geometry: geom
            });
            driveDataMap[rCode] = { name: rName, time: est.time, dist: est.dist, estimated: true };
            seenIds.add(rCode);
          });
        }
      } catch (e) {
        console.error("Overpass API error:", e);
      }
    }
  }

  activeLayers._provOutlines = provinceOutlines;

  // 8. 检查本地缓存（用城市坐标作为 key）
  const cacheKey = `drive_${lng.toFixed(2)}_${lat.toFixed(2)}`;
  let cached = null;
  try { cached = JSON.parse(localStorage.getItem(cacheKey)); } catch(e) {}

  if (!forceReload && cached && typeof cached === 'object' && Object.keys(cached).length > 0) {
    // 有缓存：直接用缓存的 OSRM 数据
    for (const [code, data] of Object.entries(cached)) {
      if (driveDataMap[code]) {
        driveDataMap[code] = { ...driveDataMap[code], ...data, estimated: false };
      }
    }
    renderMap();
    finalizeQueryState();
    setQueryBtnText("查询");
    hideLoading();
    updateURL(name);
  } else {
    // 无缓存：先用估算数据渲染，再 OSRM 精确化
    renderMap();
    renderResultList();
    hideLoading();
    updateURL(name);

    // 9. OSRM 批量计算真实驾车时间（逐批更新渲染）
    const destinations = [];
    for (const f of allCountyFeatures) {
      const code = String(f?.properties?.adcode || "");
      const center = f?.properties?.centroid || f?.properties?.center;
      const fname = f?.properties?.name || "";
      if (center && center.length === 2) {
        destinations.push({ adcode: code, lng: center[0], lat: center[1], name: fname });
      }
    }

    const batchSize = 50;
    const osrmCache = {};
    const batches = [];
    for (let i = 0; i < destinations.length; i += batchSize) {
      batches.push(destinations.slice(i, i + batchSize));
    }

    // 串行逐批请求 OSRM，每批完成后刷新
    showLoading(t('loadingDriveTime', { done: '0', total: String(batches.length) }));
    setQueryBtnText("计算驾车...");
    for (let bi = 0; bi < batches.length; bi++) {
      const batch = batches[bi];
      const coords = `${lng},${lat};` + batch.map(d => `${d.lng},${d.lat}`).join(";");
      const destIndices = batch.map((_, j) => j + 1).join(";");
      const url = `https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&destinations=${destIndices}&annotations=duration,distance`;
      try {
        if (signal.aborted) break; // 欢迎屏打开，停止
        const res = await fetch(url, { signal });
        const data = await res.json();
        if (data.code === "Ok") {
          const durations = data.durations[0];
          const distances = data.distances[0];
          batch.forEach((d, j) => {
            const timeSec = durations[j];
            const distM = distances[j];
            if (timeSec != null && timeSec > 0) {
              const result = {
                name: d.name,
                time: Math.round(timeSec / 360) / 10,
                dist: Math.round(distM / 1000)
              };
              driveDataMap[d.adcode] = { ...driveDataMap[d.adcode], ...result, estimated: false };
              osrmCache[d.adcode] = result;
            } else {
              // OSRM 返回 null = 无法到达（跨海等），标记为超远
              driveDataMap[d.adcode] = { ...driveDataMap[d.adcode], time: 999, dist: 0, estimated: false };
              osrmCache[d.adcode] = { name: d.name, time: 999, dist: 0 };
            }
          });
        }
      } catch(e) {
        if (e.name === 'AbortError') break; // 用户回到欢迎屏，停止
      }
      if (signal.aborted) break;
      showLoading(t('loadingDriveTime', { done: String(bi + 1), total: String(batches.length) }));
      renderMap(true);
      renderResultList();
    }
    if (!signal.aborted) {
      finalizeQueryState();
      setQueryBtnText("查询");
      hideLoading();
    }

    // 保存到 localStorage
    try { localStorage.setItem(cacheKey, JSON.stringify(osrmCache)); } catch(e) {}
  }

  // 更新 URL
  updateURL(name);
}

// ── URL 参数：支持 ?city=xxx ──
function updateURL(name) {
  const url = new URL(window.location);
  url.searchParams.set('city', name);
  history.replaceState(null, '', url.toString());
}

// 切换城市时更新 URL
const _origSwitchCity = switchCity;

// ── 欢迎屏逻辑 ──
let welcomeVisible = false;
let currentCityAbortController = null; // 取消当前城市的后台请求

function showWelcome() {
  const ws = document.getElementById('welcome-screen');
  if (!ws) return;
  welcomeVisible = true;
  pendingCity = null;
  hasQueried = false;
  disableQueryBtn();
  renderResultList();
  ws.classList.remove('hidden');
  requestAnimationFrame(() => ws.classList.remove('fade-out'));
  // 清空搜索框
  const wi = document.getElementById('welcome-input');
  const wr = document.getElementById('welcome-results');
  if (wi) wi.value = '';
  if (wr) wr.style.display = 'none';
  // 隐藏 loading
  hideLoading();
  // 取消后台 OSRM/Overpass 请求
  if (currentCityAbortController) {
    currentCityAbortController.abort();
    currentCityAbortController = null;
  }
  // 清除 URL 参数
  history.replaceState(null, '', '/');
}

function dismissWelcome() {
  const ws = document.getElementById('welcome-screen');
  if (!ws) return;
  welcomeVisible = false;
  ws.classList.add('fade-out');
  setTimeout(() => ws.classList.add('hidden'), 500);
}

// 点击标题卡片回到欢迎屏
document.addEventListener('DOMContentLoaded', () => {
  const card = document.getElementById('title-overlay-card');
  if (card) card.addEventListener('click', showWelcome);
});

async function welcomeSelectCity(name) {
  dismissWelcome();
  showLoading(t('loading'));
  try {
    const res = await fetch(`/api/search?keywords=${encodeURIComponent(name)}`);
    const data = await res.json();
    if (data.length > 0) {
      const item = data[0];
      const resolved = item.display_name.split(",")[0];
      const cc = item.country_code || 'cn';
      queueCitySelection(resolved, parseFloat(item.lon), parseFloat(item.lat), cc);
      hideLoading();
      return;
    }
  } catch(e) {}

  // 搜索无结果时，退化到区划中心点
  try {
    const geoRes = await fetch(`/api/geo?keywords=${encodeURIComponent(name)}`);
    const geoData = await geoRes.json();
    const center = String(geoData?.city?.center || "").split(",");
    if (center.length === 2) {
      const lng = parseFloat(center[0]);
      const lat = parseFloat(center[1]);
      if (Number.isFinite(lng) && Number.isFinite(lat)) {
        queueCitySelection(name, lng, lat, 'cn');
        hideLoading();
        return;
      }
    }
  } catch (e) {}

  hideLoading();
}

(function initWelcomeSearch() {
  const input = document.getElementById('welcome-input');
  const results = document.getElementById('welcome-results');
  if (!input) return;
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 2) { results.style.display = 'none'; return; }
    timer = setTimeout(async () => {
      try {
        const r = await fetch(`/api/search?keywords=${encodeURIComponent(q)}`);
        const data = await r.json();
        results.innerHTML = '';
        if (!data.length) {
          results.innerHTML = `<div class="result-item" style="color:#888">${t('noResult')}</div>`;
          results.style.display = 'block'; return;
        }
        data.forEach(item => {
          const el = document.createElement('div');
          el.className = 'result-item';
          el.textContent = item.display_name;
          el.onclick = () => {
            results.style.display = 'none';
            const name = item.display_name.split(",")[0];
            const cc = item.country_code || 'cn';
            input.value = name;
            queueCitySelection(name, parseFloat(item.lon), parseFloat(item.lat), cc, { dismissWelcome: true });
          };
          results.appendChild(el);
        });
        results.style.display = 'block';
      } catch(e) { results.style.display = 'none'; }
    }, 400);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { results.style.display = 'none'; }
  });
})();

// ── 首次加载 ──
(async function init() {
  // 检查 URL 参数是否指定了城市
  const urlCity = new URLSearchParams(window.location.search).get('city');

  if (urlCity) {
    // 有 URL 参数：跳过欢迎屏，直接加载
    dismissWelcome();
    document.getElementById("title-sub").textContent = `${urlCity} · 耗时&距离`;
    document.getElementById("legend-origin").textContent = `出发市 (${urlCity})`;
    document.title = urlCity;
    searchInput.value = urlCity;
    showLoading(t('loading') || '...');

    try {
      const res = await fetch(`/api/search?keywords=${encodeURIComponent(urlCity)}`);
      const data = await res.json();
      if (data.length > 0) {
        const item = data[0];
        const name = item.display_name.split(",")[0];
        const cc = item.country_code || 'cn';
        searchInput.value = name;
        await switchCity(name, parseFloat(item.lon), parseFloat(item.lat), cc);
        return;
      }
    } catch(e) {}
  }

  // 没有 URL 参数：显示欢迎屏，不加载默认城市
  // 欢迎屏已在 HTML 中默认显示，等用户选择城市
})();
</script>
